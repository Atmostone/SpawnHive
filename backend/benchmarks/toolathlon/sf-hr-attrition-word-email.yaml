id: sf-hr-attrition-word-email
suite: toolathlon
input:
  title: SF Hr Attrition Word Email
  description: |
    Hello, I am the HR analytics lead and I need an employee attrition risk analysis. We define "flight risk" employees as those with a performance rating of 4 or above and a job satisfaction score below 2.0. These are high performers who are unhappy and likely to leave.

    Please do the following:

    Query our HR database to get a breakdown of flight risk employees by department. For each department, calculate the count of flight risk employees, the average salary rounded to 2 decimal places, and the average years of experience rounded to 1 decimal place. Sort the results by flight risk count from highest to lowest.

    Also pull the top 10 highest risk employees, meaning those with the highest performance rating and lowest satisfaction. Sort by performance rating descending, then by satisfaction ascending. For each employee, include their employee ID, name, department, role, performance rating, satisfaction score rounded to 2 decimal places, and salary.

    Create a Word document called Attrition_Risk.docx in the workspace. It should have a top level heading "Employee Attrition Risk Analysis". Then a section "Flight Risk by Department" with a table containing columns Department, Flight_Risk_Count, Avg_Salary, Avg_Experience. Then a section "Top 10 Highest Risk Employees" with a table containing columns Employee_ID, Name, Department, Role, Performance, Satisfaction, Salary. After the tables, add a summary paragraph stating the total number of employees in the company, the total number of flight risk employees, the percentage of employees who are flight risks (rounded to 1 decimal), and which department has the most flight risk employees.

    After creating the report, send an email to hr-director@company.example.com with the subject "Attrition Risk Analysis Report" summarizing the key findings. The email body should mention the total flight risk count, the percentage, and the top 3 departments with the most flight risk employees.
gold:
  capability_spec:
    required_tools:
    - snowflake
    - word
    - emails
    - filesystem
    match: all
  external_eval:
    preprocess_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/sf-hr-attrition-word-email/preprocess/main.py --agent_workspace ${AGENT_WORKSPACE} --launch_time ${LAUNCH_TIME}
    eval_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/sf-hr-attrition-word-email/evaluation/main.py --agent_workspace ${AGENT_WORKSPACE} --groundtruth_workspace ${GROUNDTRUTH_WORKSPACE} --launch_time ${LAUNCH_TIME} --res_log_file ${RES_LOG_FILE}
    groundtruth_path: tasks/finalpool/sf-hr-attrition-word-email/groundtruth_workspace
environment:
  required_services:
  - toolathlon_pg
  mcp_servers:
  - snowflake
  - word
  - emails
  - filesystem
meta:
  source: toolathlon_gym
  family: snowflake
  needed_mcp_servers:
  - snowflake
  - word
  - emails
  - filesystem
  task_path: tasks/finalpool/sf-hr-attrition-word-email
  license: Apache-2.0
