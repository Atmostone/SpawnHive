worker_processes auto;
events { worker_connections 1024; }

http {
    # docker-internal DNS resolver — needed for upstream resolution to follow replicas.
    resolver 127.0.0.11 valid=10s ipv6=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8000;

        # Big bodies for document uploads.
        client_max_body_size 50m;

        # WebSocket endpoints. We don't have multi-replica sticky in OSS nginx
        # without a paid module, but Redis pub/sub already broadcasts events to
        # every replica — a WS client connected to api-2 still sees events
        # generated by api-1. Sticky would optimise reconnects only.
        location /ws/ {
            set $ws_upstream "api:8000";
            proxy_pass http://$ws_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;

            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        # Stateless REST. Variable-based upstream forces nginx to re-resolve
        # `api` via the docker DNS on each request, picking up scaled replicas.
        location / {
            set $rest_upstream "api:8000";
            proxy_pass http://$rest_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
        }
    }
}
