id: arxiv-research-report
suite: toolathlon-open
input:
  title: Arxiv LLM Reasoning Survey Docx Pdf
  description: |
    I am preparing a research survey on reasoning capabilities in large language models and I need your help gathering information and producing a report. Please search for recent academic papers that deal with reasoning in large language models, covering topics such as chain-of-thought prompting, tree-based deliberation, self-consistency methods, process supervision for mathematical reasoning, and reinforcement learning approaches to scaling reasoning. I expect there to be around five relevant papers on these topics in the database.

    For each paper you find, please retrieve the full details including title, authors, abstract, and any available content. I also need you to look up citation counts and publication venue information for these papers through a scholarly search. Additionally, please examine the source manuscripts of the papers to read their methodology sections in detail, as this will be important for the comparison section of the report.

    Once you have gathered all the necessary information, please create a Word document called LLM_Reasoning_Survey.docx in my workspace. The document should have a title at the top reading "Survey: Reasoning Capabilities in Large Language Models" followed by four main sections. The first section should be an Introduction that provides an overview of the field of reasoning in large language models and explains why this area of research is significant. The second section should be a Literature Review that summarizes each of the papers you found, clearly stating for each paper its title, authors, key contribution, citation count, and publication venue. The third section should be a Methodology Comparison that analyzes and contrasts the different approaches taken across the papers you reviewed, discussing how each method addresses the challenge of improving reasoning in language models. The fourth and final section should be a Conclusion that synthesizes the main findings, identifies common themes, and discusses potential future directions for research in this area.

    After creating the Word document, please also export or convert it to a PDF file named LLM_Reasoning_Survey.pdf in the same workspace directory. Both files should be present when you are finished.

    ## Deliverables (save all of these as local files in your workspace)
    - LLM_Reasoning_Survey.docx — Word document titled "Survey: Reasoning Capabilities in Large Language Models" with four sections (Introduction; Literature Review summarizing each paper's title, authors, key contribution, citation count, and venue; Methodology Comparison contrasting the approaches; Conclusion synthesizing findings and future directions).
    - LLM_Reasoning_Survey.pdf — a PDF export/conversion of the same survey document, placed in the same workspace directory.
gold:
  capability_spec:
    required_tools:
    - arxiv_local
    - scholarly
    - arxiv-latex
    - word
    - pdf-tools
    - filesystem
    match: all
  external_eval:
    preprocess_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/arxiv-research-report/preprocess/main.py --agent_workspace ${AGENT_WORKSPACE} --launch_time ${LAUNCH_TIME}
    eval_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/arxiv-research-report/evaluation/main.py --agent_workspace ${AGENT_WORKSPACE} --groundtruth_workspace ${GROUNDTRUTH_WORKSPACE} --launch_time ${LAUNCH_TIME} --res_log_file ${RES_LOG_FILE}
    groundtruth_path: tasks/finalpool/arxiv-research-report/groundtruth_workspace
environment:
  required_services:
  - toolathlon_pg
  mcp_servers:
  - arxiv_local
  - scholarly
  - arxiv-latex
  - word
  - pdf-tools
  - filesystem
meta:
  source: toolathlon_gym_open
  family: arxiv_local
  needed_mcp_servers:
  - arxiv_local
  - scholarly
  - arxiv-latex
  - word
  - pdf-tools
  - filesystem
  removed_servers: []
  added_servers: []
  task_path: tasks/finalpool/arxiv-research-report
  license: Apache-2.0
  redirect: |
    PURE: already file-only, no output redirect needed. Deliverables LLM_Reasoning_Survey.docx
    and LLM_Reasoning_Survey.pdf were already local files in the original task; servers unchanged.
