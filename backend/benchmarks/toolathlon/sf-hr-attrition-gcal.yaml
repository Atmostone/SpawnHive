id: sf-hr-attrition-gcal
suite: toolathlon
input:
  title: SF Hr Attrition Gcal
  description: |
    The HR leadership team wants to identify departments that may be at risk of employee attrition due to low job satisfaction. Please query the HR analytics database to calculate the average job satisfaction score and average work-life balance score for each department, along with the employee count and average performance rating. Sort the results by average satisfaction score in ascending order to identify the departments with the lowest morale.

    Create an Excel file named Satisfaction_Report.xlsx in the workspace with two sheets. The first sheet should be named "Department Scores" and should contain all seven departments with columns Department, Employee_Count, Avg_Satisfaction, Avg_Work_Life_Balance, and Avg_Performance, with values rounded to two decimal places where applicable. Sort the rows by Avg_Satisfaction in ascending order. The second sheet should be named "Action Items" and should list only the bottom three departments by satisfaction score, with columns Department, Avg_Satisfaction, and Status where the status for each should be set to "Needs Review".

    For each of the three departments identified as needing review, schedule a one-hour calendar event titled "HR Review - " followed by the department name. These meetings should be scheduled on March 16, 2026, starting at 9:00 AM, 10:30 AM, and 12:00 PM respectively in the America/New_York time zone. Each event description should mention the department name and its average satisfaction score.

    After scheduling the meetings, send an email to hr-director@company.example.com with the subject "Department Satisfaction Review Summary". The email body should list all seven departments with their average satisfaction scores and highlight which three departments have been flagged for review, along with the scheduled meeting dates.
gold:
  capability_spec:
    required_tools:
    - snowflake
    - google_calendar
    - emails
    - excel
    - filesystem
    match: all
  external_eval:
    preprocess_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/sf-hr-attrition-gcal/preprocess/main.py --agent_workspace ${AGENT_WORKSPACE} --launch_time ${LAUNCH_TIME}
    eval_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/sf-hr-attrition-gcal/evaluation/main.py --agent_workspace ${AGENT_WORKSPACE} --groundtruth_workspace ${GROUNDTRUTH_WORKSPACE} --launch_time ${LAUNCH_TIME} --res_log_file ${RES_LOG_FILE}
    groundtruth_path: tasks/finalpool/sf-hr-attrition-gcal/groundtruth_workspace
environment:
  required_services:
  - toolathlon_pg
  mcp_servers:
  - snowflake
  - google_calendar
  - emails
  - excel
  - filesystem
meta:
  source: toolathlon_gym
  family: snowflake
  needed_mcp_servers:
  - snowflake
  - google_calendar
  - emails
  - excel
  - filesystem
  task_path: tasks/finalpool/sf-hr-attrition-gcal
  license: Apache-2.0
