id: scholarly-nlp-survey-word
suite: toolathlon-open
input:
  title: Scholarly NLP Transformer Survey Word
  description: |
    I am preparing a literature survey on transformer-based NLP research for a graduate seminar. I need you to look up recent papers about transformers and language models from the academic literature, focusing on landmark NLP papers like BERT, GPT-4, Attention Is All You Need, RoBERTa, the T5 paper, and InstructGPT.

    Please create two files in my workspace.

    First, create a Word document called "NLP_Transformer_Survey.docx" that serves as a literature review. It should have the title "Transformer-Based NLP: A Literature Survey" at the top, include today's date (2026-03-06), and have paragraphs discussing each of the key papers you find. Each paper should be mentioned by name in the document, with a brief description of what it contributes to the field.

    Second, create an Excel spreadsheet called "NLP_Paper_Catalog.xlsx" with two sheets. The first sheet should be called "Papers" and contain columns for Title, Authors, Year, Citations, and Venue, with one row per paper. The second sheet should be called "Summary" and contain a simple summary table with two columns (Metric and Value) listing the Total_Papers count, the Avg_Citations across all papers, and the name of the Most_Cited_Paper.

    Only include the NLP and transformer-related papers, not papers about unrelated topics like point clouds or soil microbiomes.

    ## Deliverables (save all of these as local files in your workspace)
    - NLP_Transformer_Survey.docx — Word literature review with the title "Transformer-Based NLP: A Literature Survey", the date 2026-03-06, and one paragraph per key NLP/transformer paper naming it and describing its contribution (no unrelated papers like point clouds or soil microbiomes).
    - NLP_Paper_Catalog.xlsx — Excel workbook with a "Papers" sheet (columns Title, Authors, Year, Citations, Venue; one row per paper) and a "Summary" sheet (Metric/Value table listing Total_Papers, Avg_Citations, and Most_Cited_Paper).
gold:
  capability_spec:
    required_tools:
    - scholarly
    - word
    - excel
    - filesystem
    match: all
  external_eval:
    preprocess_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/scholarly-nlp-survey-word/preprocess/main.py --agent_workspace ${AGENT_WORKSPACE} --launch_time ${LAUNCH_TIME}
    eval_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/scholarly-nlp-survey-word/evaluation/main.py --agent_workspace ${AGENT_WORKSPACE} --groundtruth_workspace ${GROUNDTRUTH_WORKSPACE} --launch_time ${LAUNCH_TIME} --res_log_file ${RES_LOG_FILE}
    groundtruth_path: tasks/finalpool/scholarly-nlp-survey-word/groundtruth_workspace
environment:
  required_services:
  - toolathlon_pg
  mcp_servers:
  - scholarly
  - word
  - excel
  - filesystem
meta:
  source: toolathlon_gym_open
  family: scholarly
  needed_mcp_servers:
  - scholarly
  - word
  - excel
  - filesystem
  removed_servers: []
  added_servers: []
  task_path: tasks/finalpool/scholarly-nlp-survey-word
  license: Apache-2.0
  redirect: |
    PURE: already file-only, no output redirect needed.
