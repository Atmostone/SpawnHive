id: howtocook-diet-gform-notion-excel
suite: toolathlon
input:
  title: Howtocook Diet Gform Notion Excel
  description: |
    I want to set up a healthy eating program for my team. Please use our recipe database to find recipes from at least three different categories and create a comprehensive overview for the program.

    First, create a Google Form called Dietary Preference Survey with a description about gathering team food preferences. Add a required multiple-choice question asking Which meal types do you prefer with the options Breakfast, Lunch, Dinner, and Snacks. Add a required checkbox question asking Which dietary restrictions apply to you with the options Vegetarian, Vegan, Gluten-Free, Dairy-Free, and None. Add a required scale question asking How many home-cooked meals do you have per week, where the scale goes from 1 to 7. Add an optional text question asking Are there any specific ingredients you want to avoid.

    Then browse through the recipe collection and select at least six recipes representing at least three different categories. Create a Notion page titled Healthy Recipe Knowledge Base. The page should contain blocks for each selected recipe that list the recipe name, the category it belongs to, and a brief description of the recipe.

    Also create an Excel file called Recipe_Overview.xlsx in my workspace. This file should have two sheets. The first sheet should be called Recipes and contain columns for Recipe_Name, Category, and Description, with one row for each of the selected recipes. The second sheet should be called Category Summary and show each category name and how many recipes you found in it.

    Send an email to wellness.team@company.com with the subject Healthy Eating Program - Recipe Selection. The body should describe the initiative and mention the recipes selected.
gold:
  capability_spec:
    required_tools:
    - howtocook
    - google_forms
    - notion
    - excel
    - emails
    match: all
  external_eval:
    preprocess_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/howtocook-diet-gform-notion-excel/preprocess/main.py --agent_workspace ${AGENT_WORKSPACE} --launch_time ${LAUNCH_TIME}
    eval_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/howtocook-diet-gform-notion-excel/evaluation/main.py --agent_workspace ${AGENT_WORKSPACE} --groundtruth_workspace ${GROUNDTRUTH_WORKSPACE} --launch_time ${LAUNCH_TIME} --res_log_file ${RES_LOG_FILE}
    groundtruth_path: tasks/finalpool/howtocook-diet-gform-notion-excel/groundtruth_workspace
