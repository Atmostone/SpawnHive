id: yf-earnings-calendar-report
suite: toolathlon
input:
  title: YF Earnings Calendar Report
  description: |
    I am tracking a portfolio of five stocks and need a comprehensive financial summary created for our investment committee. The stocks I follow are Alphabet, Amazon, JPMorgan Chase, Johnson and Johnson, and Exxon Mobil. Please use their standard ticker symbols to look up the information.

    For each of these five stocks, retrieve the current stock information including the company short name, sector, market capitalization, trailing PE ratio, forward PE ratio, dividend yield, trailing EPS, forward EPS, total revenue, revenue growth rate, profit margins, and return on equity.

    Create an Excel file called Stock_Financial_Summary.xlsx in the workspace with two sheets. The first sheet should be called "Stock Overview" with columns Ticker, Company_Name, Sector, Market_Cap, Trailing_PE, Forward_PE, Dividend_Yield, and Trailing_EPS. Sort alphabetically by Ticker. Use raw numeric values for Market_Cap and express Dividend_Yield as a decimal (for example 0.02 for 2 percent).

    The second sheet should be called "Profitability Metrics" with columns Ticker, Total_Revenue, Revenue_Growth, Profit_Margins, Return_On_Equity, and Forward_EPS. Again sort alphabetically by Ticker. Use raw numeric values for Total_Revenue and express percentages as decimals.

    Also create a spreadsheet in our shared workspace titled "Portfolio Watch List" with a sheet called "Summary". In this sheet put the same Stock Overview data so the team can access it collaboratively. The columns should match the Excel Stock Overview sheet exactly.
gold:
  capability_spec:
    required_tools:
    - yahoo-finance
    - google_sheet
    - excel
    - filesystem
    match: all
  external_eval:
    preprocess_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/yf-earnings-calendar-report/preprocess/main.py --agent_workspace ${AGENT_WORKSPACE} --launch_time ${LAUNCH_TIME}
    eval_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/yf-earnings-calendar-report/evaluation/main.py --agent_workspace ${AGENT_WORKSPACE} --groundtruth_workspace ${GROUNDTRUTH_WORKSPACE} --launch_time ${LAUNCH_TIME} --res_log_file ${RES_LOG_FILE}
    groundtruth_path: tasks/finalpool/yf-earnings-calendar-report/groundtruth_workspace
environment:
  required_services:
  - toolathlon_pg
  mcp_servers:
  - yahoo-finance
  - google_sheet
  - excel
  - filesystem
meta:
  source: toolathlon_gym
  family: yahoo-finance
  needed_mcp_servers:
  - yahoo-finance
  - google_sheet
  - excel
  - filesystem
  task_path: tasks/finalpool/yf-earnings-calendar-report
  license: Apache-2.0
