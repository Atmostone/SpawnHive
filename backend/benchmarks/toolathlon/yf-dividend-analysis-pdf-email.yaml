id: yf-dividend-analysis-pdf-email
suite: toolathlon
input:
  title: YF Dividend Analysis Pdf Email
  description: |
    Our investment team wants to analyze dividend-paying stocks in our watchlist. The stocks to analyze are JNJ, JPM, XOM, and GOOGL. For each stock, look up the current stock information including the company name, sector, current dividend yield, annual dividend rate per share, and the five-year average dividend yield if available. Also get the most recent closing price for each stock.

    Create a PDF report called Dividend_Analysis.pdf in the workspace. The report should have a title "Dividend Analysis Report" centered at the top, with the date March 6, 2026 and a line listing the stocks analyzed.

    Include a table titled "Dividend Overview" with columns: Symbol, Sector, Price (with dollar sign and 2 decimal places), Div Yield in percent (the dividend yield multiplied by 100, shown to 2 decimal places), Annual Div in dollars (the annual dividend rate with 2 decimal places), and 5Y Avg Yield in percent (shown to 2 decimal places, or N/A if not available).

    After the table, add an "Analysis Summary" section. Rank the stocks from highest to lowest dividend yield, showing each stock's symbol, full company name, and yield percentage. Then show the average dividend yield across all four stocks (as a percentage with 2 decimal places) and the total of all annual dividend rates.

    Add a "Recommendation" section with a brief statement identifying which stock has the highest dividend yield and noting that investors should consider the trade-off between yield and sector diversification.

    After creating the PDF, send an email from analyst@investteam.com to team@investteam.com with the subject "Dividend Analysis Summary - March 2026". The email body should list each stock with its symbol, dividend yield percentage, and annual dividend rate, sorted by yield from highest to lowest. Include the average yield at the bottom of the email.
gold:
  capability_spec:
    required_tools:
    - yahoo-finance
    - pdf-tools
    - emails
    - filesystem
    match: all
  external_eval:
    preprocess_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/yf-dividend-analysis-pdf-email/preprocess/main.py --agent_workspace ${AGENT_WORKSPACE} --launch_time ${LAUNCH_TIME}
    eval_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/yf-dividend-analysis-pdf-email/evaluation/main.py --agent_workspace ${AGENT_WORKSPACE} --groundtruth_workspace ${GROUNDTRUTH_WORKSPACE} --launch_time ${LAUNCH_TIME} --res_log_file ${RES_LOG_FILE}
    groundtruth_path: tasks/finalpool/yf-dividend-analysis-pdf-email/groundtruth_workspace
environment:
  required_services:
  - toolathlon_pg
  mcp_servers:
  - yahoo-finance
  - pdf-tools
  - emails
  - filesystem
meta:
  source: toolathlon_gym
  family: yahoo-finance
  needed_mcp_servers:
  - yahoo-finance
  - pdf-tools
  - emails
  - filesystem
  task_path: tasks/finalpool/yf-dividend-analysis-pdf-email
  license: Apache-2.0
