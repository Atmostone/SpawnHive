name: migrations

on:
  push:
    branches: ["main", "master"]
    paths:
      - "backend/alembic/**"
      - "backend/app/models/**"
      - ".github/workflows/migrations.yml"
  pull_request:
    paths:
      - "backend/alembic/**"
      - "backend/app/models/**"

jobs:
  round-trip:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: spawnhive_test
          POSTGRES_USER: spawnhive
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd "pg_isready -U spawnhive"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://spawnhive:password@localhost:5432/spawnhive_test
      JWT_SECRET: ci-test-secret-please-rotate

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: Run migration round-trip tests
        working-directory: backend
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
        run: pytest tests/integration/test_migrations.py -v
