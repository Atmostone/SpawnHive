id: howtocook-event-menu-ppt
suite: toolathlon-open
input:
  title: Howtocook Event Menu Ppt
  description: |
    I am organizing a company team-building dinner event and need your help planning the menu. I want to browse available dinner recipes and put together a multi-course meal with an appetizer, a main course, and a dessert.

    For each course, please find a suitable recipe. You can search or browse recipes to find good options for a dinner event. Once you have selected the recipes, I need two deliverables:

    First, create a PowerPoint presentation called "Event_Menu_Presentation.pptx" in the workspace. The presentation should have a title slide with the text "Company Team Dinner Menu", then one slide per course (appetizer, main course, and dessert) showing the recipe name and its ingredients, and finally a summary slide that lists the total number of ingredients across all courses.

    Second, create an Excel file called "Menu_Budget.xlsx" in the workspace. It should have two sheets. The first sheet called "Menu Items" should have columns for Course, Recipe_Name, Ingredients_Count, and Difficulty. The second sheet called "Summary" should have columns for Metric and Value, with rows for Total_Recipes, Total_Ingredients, and Avg_Difficulty.

    For the difficulty, use a numeric scale: 1 for easy recipes, 2 for medium, and 3 for hard. If the recipe does not specify difficulty, default to 2.

    ## Deliverables (save all of these as local files in your workspace)
    - Event_Menu_Presentation.pptx — A PowerPoint deck with a title slide ("Company Team Dinner Menu"), one slide per course (appetizer, main course, dessert) listing the recipe name and its ingredients, and a summary slide with the total number of ingredients across all courses.
    - Menu_Budget.xlsx — An Excel workbook with a "Menu Items" sheet (columns: Course, Recipe_Name, Ingredients_Count, Difficulty) and a "Summary" sheet (columns: Metric, Value; rows: Total_Recipes, Total_Ingredients, Avg_Difficulty), with difficulty on a 1=easy / 2=medium / 3=hard scale defaulting to 2.
gold:
  capability_spec:
    required_tools:
    - howtocook
    - pptx
    - excel
    - filesystem
    match: all
  external_eval:
    preprocess_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/howtocook-event-menu-ppt/preprocess/main.py --agent_workspace ${AGENT_WORKSPACE} --launch_time ${LAUNCH_TIME}
    eval_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/howtocook-event-menu-ppt/evaluation/main.py --agent_workspace ${AGENT_WORKSPACE} --groundtruth_workspace ${GROUNDTRUTH_WORKSPACE} --launch_time ${LAUNCH_TIME} --res_log_file ${RES_LOG_FILE}
    groundtruth_path: tasks/finalpool/howtocook-event-menu-ppt/groundtruth_workspace
environment:
  required_services:
  - toolathlon_pg
  mcp_servers:
  - howtocook
  - pptx
  - excel
  - filesystem
meta:
  source: toolathlon_gym_open
  family: howtocook
  needed_mcp_servers:
  - howtocook
  - pptx
  - excel
  - filesystem
  removed_servers: []
  added_servers: []
  task_path: tasks/finalpool/howtocook-event-menu-ppt
  license: Apache-2.0
  redirect: |
    PURE: already file-only, no output redirect needed
