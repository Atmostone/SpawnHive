id: scholarly-arxiv-cross-reference
suite: toolathlon
input:
  title: Scholarly Arxiv Cross Reference
  description: |
    I am a research librarian doing a cross-reference analysis between two academic databases. I need to compare the papers available in the Scholarly database (specifically the arxiv_papers collection) with those in the arxiv database to find overlapping papers and understand coverage differences.

    Please create an Excel file called "Citation_Cross_Reference.xlsx" in my workspace with three sheets.

    The first sheet, "Scholarly_Papers", should list all papers from the Scholarly arxiv_papers collection with columns: Paper_ID, Title, Authors, Published_Year, Journal_Ref.

    The second sheet, "Arxiv_Papers", should list all papers from the arxiv database with columns: Paper_ID, Title, Authors, Published_Year, Categories.

    The third sheet, "Overlap_Analysis", should contain papers that appear in both databases (matched by their paper ID), with columns: Paper_ID, Title, In_Scholarly (Yes/No), In_Arxiv (Yes/No). Also include papers unique to each database.

    After creating the spreadsheet, please send an email summarizing the findings. Send it from librarian@university.edu to research-lead@university.edu with the subject "Cross-Reference Analysis: Scholarly vs Arxiv Paper Databases". The email body should mention the total number of papers in each database, the number of overlapping papers, and highlight any papers that are unique to one database.
gold:
  capability_spec:
    required_tools:
    - scholarly
    - arxiv_local
    - excel
    - emails
    - filesystem
    match: all
  external_eval:
    preprocess_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/scholarly-arxiv-cross-reference/preprocess/main.py --agent_workspace ${AGENT_WORKSPACE} --launch_time ${LAUNCH_TIME}
    eval_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/scholarly-arxiv-cross-reference/evaluation/main.py --agent_workspace ${AGENT_WORKSPACE} --groundtruth_workspace ${GROUNDTRUTH_WORKSPACE} --launch_time ${LAUNCH_TIME} --res_log_file ${RES_LOG_FILE}
    groundtruth_path: tasks/finalpool/scholarly-arxiv-cross-reference/groundtruth_workspace
environment:
  required_services:
  - toolathlon_pg
  mcp_servers:
  - scholarly
  - arxiv_local
  - excel
  - emails
  - filesystem
meta:
  source: toolathlon_gym
  family: scholarly
  needed_mcp_servers:
  - scholarly
  - arxiv_local
  - excel
  - emails
  - filesystem
  task_path: tasks/finalpool/scholarly-arxiv-cross-reference
  license: Apache-2.0
