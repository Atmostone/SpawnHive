    eval_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/sf-sales-trend-word-pdf/evaluation/main.py --agent_workspace ${AGENT_WORKSPACE} --groundtruth_workspace ${GROUNDTRUTH_WORKSPACE} --launch_time ${LAUNCH_TIME} --res_log_file ${RES_LOG_FILE}
    groundtruth_path: tasks/finalpool/sf-sales-trend-word-pdf/groundtruth_workspace
