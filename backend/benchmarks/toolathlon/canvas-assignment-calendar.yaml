id: canvas-assignment-calendar
suite: toolathlon
input:
  title: Canvas Assignment Calendar
  description: |
    I am the academic coordinator at Open University and I need to build a consolidated assignment schedule for all Fall 2014 courses. Please look up every course from the Fall 2014 semester in our learning management system, which are the ones whose course codes end with 2014J.

    For each course, retrieve all assignments that have a due date set. I need you to create a calendar event for every such assignment. Each event should be titled "[Course Code] - [Assignment Name]" (for example "AAA-2014J - TMA 1758"), should be scheduled as an all-day event on the assignment's due date, and the description should read "Assignment for [Full Course Name]. Due date: [YYYY-MM-DD]." Use the America/New_York timezone for all events.

    After creating all the calendar events, send a single consolidated email from coordinator@openuniversity.ac.uk to students@openuniversity.ac.uk with the subject "Fall 2014 Assignment Schedule". The body of the email should list each course in alphabetical order by course code, and under each course list all its assignments sorted by due date, showing the assignment name and due date in YYYY-MM-DD format. Use a blank line between courses for readability. At the end of the email body include a line that says "Total assignments with due dates: [N]" where N is the total count of assignments that have due dates across all courses.

    Also save a plain text file called assignment_schedule.txt in the workspace. This file should contain each assignment on its own line in the format "[Course Code] - [Assignment Name] - [YYYY-MM-DD]", with each field separated by space-dash-space, sorted first by course code alphabetically and then by due date ascending within each course.
gold:
  capability_spec:
    required_tools:
    - canvas
    - google_calendar
    - emails
    - filesystem
    match: all
  external_eval:
    preprocess_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/canvas-assignment-calendar/preprocess/main.py --agent_workspace ${AGENT_WORKSPACE} --launch_time ${LAUNCH_TIME}
    eval_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/canvas-assignment-calendar/evaluation/main.py --agent_workspace ${AGENT_WORKSPACE} --groundtruth_workspace ${GROUNDTRUTH_WORKSPACE} --launch_time ${LAUNCH_TIME} --res_log_file ${RES_LOG_FILE}
    groundtruth_path: tasks/finalpool/canvas-assignment-calendar/groundtruth_workspace
environment:
  required_services:
  - toolathlon_pg
  mcp_servers:
  - canvas
  - google_calendar
  - emails
  - filesystem
meta:
  source: toolathlon_gym
  family: canvas
  needed_mcp_servers:
  - canvas
  - google_calendar
  - emails
  - filesystem
  task_path: tasks/finalpool/canvas-assignment-calendar
  license: Apache-2.0
