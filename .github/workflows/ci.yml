name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: spawnhive_test
          POSTGRES_USER: spawnhive
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd "pg_isready -U spawnhive"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://spawnhive:password@localhost:5432/spawnhive_test
      JWT_SECRET: ci-test-secret-please-rotate

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check backend/app

      - name: Run pytest
        working-directory: backend
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
        # --cov-fail-under enforces the 60% coverage acceptance bar (legacy production-readiness §R4).
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=60
