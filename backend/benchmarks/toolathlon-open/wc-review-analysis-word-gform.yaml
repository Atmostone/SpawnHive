id: wc-review-analysis-word-gform
suite: toolathlon-open
input:
  title: WC Review Analysis Word Gform
  description: |
    Hey, I need your help analyzing our product reviews from the online store. We have customer reviews for all our products and I want to understand how each product category is performing in terms of customer satisfaction.

    Please do the following:

    Query the store data to get review statistics grouped by product category. For each category, I need the total number of reviews, the average rating rounded to 2 decimal places, the count of positive reviews (rating 4 or 5), and the count of negative reviews (rating 1 or 2). Sort the results by average rating from highest to lowest.

    Also identify the top 5 best rated products and the 5 lowest rated products, considering only products that have at least 3 reviews. For each product, include the product name, its category, the number of reviews, and the average rating rounded to 2 decimal places. Sort the best products by average rating descending and the worst products by average rating ascending.

    Create a Word document called Review_Analysis.docx in the workspace. It should have a top level heading "Product Review Analysis Report". Then include a section "Review Ratings by Category" with a table containing columns Category, Review_Count, Avg_Rating, Positive_Count, Negative_Count. Then a section "Top Rated Products" with a table of Product_Name, Category, Reviews, Avg_Rating. Then a section "Lowest Rated Products" with the same column structure. After all tables, write a summary paragraph mentioning the total number of reviews analyzed, the number of categories, the overall average rating, and which category has the highest and lowest average ratings.

    After that, prepare a feedback survey form titled "Product Improvement Feedback" with these questions: one asking "Which product category do you primarily purchase from?" as a multiple choice with the category names as options, one asking "How would you rate your overall shopping experience?" as a linear scale from 1 to 5, and one asking "What improvements would you suggest for our products?" as a paragraph text response. Save the form's questions as a local file Product_Improvement_Feedback_Form.md. List the form title, and for each question its full text, its question type (multiple choice / linear scale 1-5 / paragraph text), and its answer options (for the category question, list the category names as options).

    ## Deliverables (save all of these as local files in your workspace)
    - Review_Analysis.docx — Word document with top level heading "Product Review Analysis Report"; a "Review Ratings by Category" section with a table (columns Category, Review_Count, Avg_Rating, Positive_Count, Negative_Count) sorted by average rating descending; a "Top Rated Products" section with a table (Product_Name, Category, Reviews, Avg_Rating) of the top 5 products with at least 3 reviews sorted by average rating descending; a "Lowest Rated Products" section with the same columns for the 5 lowest rated products with at least 3 reviews sorted by average rating ascending; and a summary paragraph stating the total number of reviews analyzed, the number of categories, the overall average rating, and which category has the highest and lowest average ratings.
    - Product_Improvement_Feedback_Form.md — the "Product Improvement Feedback" form questions: "Which product category do you primarily purchase from?" (multiple choice, with the category names as options), "How would you rate your overall shopping experience?" (linear scale 1 to 5), and "What improvements would you suggest for our products?" (paragraph text), each with its question text, type, and options listed.
gold:
  capability_spec:
    required_tools:
    - woocommerce
    - word
    - filesystem
    match: all
  external_eval:
    preprocess_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/wc-review-analysis-word-gform/preprocess/main.py --agent_workspace ${AGENT_WORKSPACE} --launch_time ${LAUNCH_TIME}
    eval_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/wc-review-analysis-word-gform/evaluation/main.py --agent_workspace ${AGENT_WORKSPACE} --groundtruth_workspace ${GROUNDTRUTH_WORKSPACE} --launch_time ${LAUNCH_TIME} --res_log_file ${RES_LOG_FILE}
    groundtruth_path: tasks/finalpool/wc-review-analysis-word-gform/groundtruth_workspace
environment:
  required_services:
  - toolathlon_pg
  mcp_servers:
  - woocommerce
  - word
  - filesystem
meta:
  source: toolathlon_gym_open
  family: woocommerce
  needed_mcp_servers:
  - woocommerce
  - word
  - google_forms
  - filesystem
  removed_servers:
  - google_forms
  added_servers: []
  task_path: tasks/finalpool/wc-review-analysis-word-gform
  license: Apache-2.0
  redirect: |
    Google Form "Product Improvement Feedback" -> Product_Improvement_Feedback_Form.md listing the form's questions (text, type, options); google_forms dropped as it was an output-only sink.
    No live form-answer collection was required, so nothing dropped on that front. The Review_Analysis.docx is already file-only via the word server, and the WooCommerce store remains the data source.
