id: sf-hr-compensation-pdf-notion
suite: toolathlon
input:
  title: SF Hr Compensation Pdf Notion
  description: |
    Hi, the HR leadership team asked me to prepare a compensation analysis using data from our employee records in the data warehouse.

    I need two things from you.

    First, query the employee data and compute salary statistics grouped by department. For each department, calculate the number of employees, average salary, minimum salary, maximum salary, and median salary. Round all salary values to 2 decimal places. Then also break it down further by department and education level, computing employee count, average salary, minimum salary, and maximum salary for each combination.

    Create a PDF file called Compensation_Report.pdf in the workspace. The PDF should have a title "Compensation Analysis Report" and a subtitle mentioning "HR Analytics Department" and the date 2026-03-06. Include a table showing the department-level summary with columns Department, Employees, Avg Salary, Min Salary, Max Salary, and Median Salary. Then include a second table showing the department and education level breakdown with columns Department, Education, Count, Avg Salary, Min Salary, and Max Salary. Sort the department summary alphabetically by department name. Sort the education breakdown by department alphabetically and then by education level alphabetically within each department.

    Also create an Excel file called Compensation_Data.xlsx in the workspace with two sheets. The first sheet should be "Department Summary" with columns Department, Employees, Avg_Salary, Min_Salary, Max_Salary, and Median_Salary. The second sheet should be "Education Breakdown" with columns Department, Education_Level, Count, Avg_Salary, Min_Salary, and Max_Salary. Same sorting as described above. All salary values should be rounded to 2 decimal places.

    Finally, create a page in the knowledge base titled "Compensation Analysis 2026" summarizing the key findings, including which department has the highest average salary and which education level overall has the most employees.
gold:
  capability_spec:
    required_tools:
    - snowflake
    - pdf-tools
    - notion
    - filesystem
    match: all
  external_eval:
    preprocess_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/sf-hr-compensation-pdf-notion/preprocess/main.py --agent_workspace ${AGENT_WORKSPACE} --launch_time ${LAUNCH_TIME}
    eval_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/sf-hr-compensation-pdf-notion/evaluation/main.py --agent_workspace ${AGENT_WORKSPACE} --groundtruth_workspace ${GROUNDTRUTH_WORKSPACE} --launch_time ${LAUNCH_TIME} --res_log_file ${RES_LOG_FILE}
    groundtruth_path: tasks/finalpool/sf-hr-compensation-pdf-notion/groundtruth_workspace
environment:
  required_services:
  - toolathlon_pg
  mcp_servers:
  - snowflake
  - pdf-tools
  - notion
  - filesystem
meta:
  source: toolathlon_gym
  family: snowflake
  needed_mcp_servers:
  - snowflake
  - pdf-tools
  - notion
  - filesystem
  task_path: tasks/finalpool/sf-hr-compensation-pdf-notion
  license: Apache-2.0
