services:
  nginx:
    image: nginx:alpine
    ports:
      - "8002:8000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - spawnhive-net

  api:
    build: ./backend
    expose:
      - "8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/shared:/data/shared
      - ./data/workspaces:/data/workspaces
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/tests:/app/tests
      - ./backend/benchmarks:/app/benchmarks
      - ./backend/pytest.ini:/app/pytest.ini
      - ./backend/requirements-dev.txt:/app/requirements-dev.txt
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://spawnhive:${POSTGRES_PASSWORD:-password}@postgres:5432/spawnhive
      - QDRANT_URL=http://qdrant:6333
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - DATA_DIR=/data
      - HOST_DATA_DIR=${PWD}/data
      # The /run endpoint claims the first batch synchronously (here in the api
      # container), so Toolathlon preprocess/eval spawning needs the gym path too.
      - TOOLATHLON_GYM_PATH=${TOOLATHLON_GYM_PATH:-${PWD}/../toolathlon_gym}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - spawnhive-net
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  orchestrator:
    build: ./backend
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/shared:/data/shared
      - ./data/workspaces:/data/workspaces
      - ./backend/app:/app/app
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://spawnhive:${POSTGRES_PASSWORD:-password}@postgres:5432/spawnhive
      - QDRANT_URL=http://qdrant:6333
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - DATA_DIR=/data
      - HOST_DATA_DIR=${PWD}/data
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - spawnhive-net
    command: python -m app.workers.orchestrator_main

  scheduler:
    build: ./backend
    # docker.sock: the experiment tick spawns Toolathlon preprocess/eval
    # containers (gold.external_eval) directly via the host daemon, like the
    # orchestrator spawns agents. TOOLATHLON_GYM_PATH is the absolute HOST path
    # of the gym clone, bind-mounted into those containers.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/shared:/data/shared
      - ./data/workspaces:/data/workspaces
      - ./backend/app:/app/app
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://spawnhive:${POSTGRES_PASSWORD:-password}@postgres:5432/spawnhive
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
      - HOST_DATA_DIR=${PWD}/data
      - TOOLATHLON_GYM_PATH=${TOOLATHLON_GYM_PATH:-${PWD}/../toolathlon_gym}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - spawnhive-net
    command: python -m app.workers.scheduler_main

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3002:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    depends_on:
      - nginx
    networks:
      - spawnhive-net

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_DB=spawnhive
      - POSTGRES_USER=spawnhive
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spawnhive"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - spawnhive-net

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrantdata:/qdrant/storage
    networks:
      - spawnhive-net

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - miniodata:/data
    ports:
      - "9001:9001"
    networks:
      - spawnhive-net

  redis:
    image: redis:7-alpine
    networks:
      - spawnhive-net

  # Toolathlon-GYM mock database (profile "toolathlon", see docs/toolathlon.md).
  # Not started by default: docker compose --profile toolathlon up -d toolathlon_pg
  # TOOLATHLON_GYM_PATH — path to the eigent-ai/toolathlon_gym clone
  # (default: sibling directory ../toolathlon_gym, relative to this file).
  # container_name is fixed: their MCP configs and scripts hardcode host "toolathlon_pg".
  # Credentials eigent/camel/toolathlon_gym match the upstream docker-compose.yml.
  toolathlon_pg:
    profiles: ["toolathlon"]
    image: postgres:15
    container_name: toolathlon_pg
    environment:
      - POSTGRES_DB=toolathlon_gym
      - POSTGRES_USER=eigent
      - POSTGRES_PASSWORD=camel
    volumes:
      - ${TOOLATHLON_GYM_PATH:-../toolathlon_gym}/db/init.sql.gz:/docker-entrypoint-initdb.d/init.sql.gz:ro
      - toolathlon-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eigent -d toolathlon_gym"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - spawnhive-net

  # SPA-69: isolated PG lanes for PARALLEL Toolathlon runs (profile "toolathlon-lanes").
  # Each lane is an independent clone of the gym DB, so concurrent cells' preprocess
  # re-seeding can't clobber each other. The scheduler pins a run to a lane via
  # Experiment.n_toolathlon_lanes and routes its preprocess/eval/agent to that host.
  # Start: docker compose --profile toolathlon-lanes up -d  (alongside, or instead of,
  # the single toolathlon_pg used by serial/legacy runs).
  toolathlon_pg_lane_0: &toolathlon_lane
    profiles: ["toolathlon-lanes"]
    image: postgres:15
    container_name: toolathlon_pg_lane_0
    environment:
      - POSTGRES_DB=toolathlon_gym
      - POSTGRES_USER=eigent
      - POSTGRES_PASSWORD=camel
    volumes:
      - ${TOOLATHLON_GYM_PATH:-../toolathlon_gym}/db/init.sql.gz:/docker-entrypoint-initdb.d/init.sql.gz:ro
      - toolathlon-pgdata-lane-0:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eigent -d toolathlon_gym"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - spawnhive-net
  toolathlon_pg_lane_1:
    <<: *toolathlon_lane
    container_name: toolathlon_pg_lane_1
    volumes:
      - ${TOOLATHLON_GYM_PATH:-../toolathlon_gym}/db/init.sql.gz:/docker-entrypoint-initdb.d/init.sql.gz:ro
      - toolathlon-pgdata-lane-1:/var/lib/postgresql/data
  toolathlon_pg_lane_2:
    <<: *toolathlon_lane
    container_name: toolathlon_pg_lane_2
    volumes:
      - ${TOOLATHLON_GYM_PATH:-../toolathlon_gym}/db/init.sql.gz:/docker-entrypoint-initdb.d/init.sql.gz:ro
      - toolathlon-pgdata-lane-2:/var/lib/postgresql/data
  toolathlon_pg_lane_3:
    <<: *toolathlon_lane
    container_name: toolathlon_pg_lane_3
    volumes:
      - ${TOOLATHLON_GYM_PATH:-../toolathlon_gym}/db/init.sql.gz:/docker-entrypoint-initdb.d/init.sql.gz:ro
      - toolathlon-pgdata-lane-3:/var/lib/postgresql/data

volumes:
  pgdata:
  qdrantdata:
  miniodata:
  toolathlon-pgdata:
  toolathlon-pgdata-lane-0:
  toolathlon-pgdata-lane-1:
  toolathlon-pgdata-lane-2:
  toolathlon-pgdata-lane-3:

networks:
  spawnhive-net:
    driver: bridge
