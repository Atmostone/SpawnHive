id: howtocook-event-menu-planner
suite: toolathlon
input:
  title: Howtocook Event Menu Planner
  description: |
    I am an event planner organizing the annual company dinner and need to create a comprehensive menu plan that accounts for dietary restrictions, budget constraints, and multiple courses.

    Start by fetching the event details from http://localhost:30234/api/event_details.json. This file contains the event name, date, guest count, per-person budget, dietary restriction breakdown, and required courses. Record all the details carefully as they will drive the menu planning.

    Next, read the Dietary_Guidelines.pdf file in the workspace. This document describes how to handle various dietary restrictions when planning menus, including substitution strategies and cross-contamination prevention. Note the key guidelines for vegetarian, gluten-free, and nut allergy accommodations.

    Then browse the recipe database to find suitable recipes for each required course. You need recipes for appetizer, main course, and dessert. For each course, select at least two recipe options: one standard option and one that accommodates the dietary restrictions (vegetarian and gluten-free). Consider the cost implications and whether the recipe can be scaled up to serve 50 guests.

    Also review the vendor contacts file in the workspace for the email addresses of the catering coordinator and the supplies vendor.

    Create an Excel workbook called Event_Menu.xlsx in the workspace with four sheets. The first sheet should be named "Menu Plan" with columns Course, Recipe_Name, Serves, Cost_Per_Person, and Dietary_Tags. Recipe names should be in English. Dietary_Tags should indicate which restrictions each recipe accommodates such as Vegetarian, Gluten-Free, or Nut-Free. Include at least two options per course. The second sheet should be named "Ingredient List" with columns Ingredient, Quantity_For_50, Unit, and Estimated_Cost. List all ingredients needed across the menu scaled for 50 guests. The third sheet should be named "Cost Summary" with columns Item and Amount, including Total_Food_Cost, Cost_Per_Person, Budget_Per_Person, Budget_Variance (budget minus actual), and Service_Fee_Estimate (15% of food cost). The fourth sheet should be named "Dietary Accommodations" with columns Restriction, Guest_Count, Menu_Options, and Notes. For each dietary restriction from the event details, list the number of affected guests, which menu items they can eat, and any special preparation notes.

    After creating the Excel file, send an email to the catering coordinator at catering@vendor.com with the subject "Menu Plan for Annual Company Dinner". The email should be from events@company.com and include a summary of the menu plan, the total cost estimate, the number of guests, and the dietary accommodations needed. The email body should be professional and include the event date.
gold:
  capability_spec:
    required_tools:
    - fetch
    - terminal
    - howtocook
    - excel
    - emails
    - pdf-tools
    match: all
  external_eval:
    preprocess_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/howtocook-event-menu-planner/preprocess/main.py --agent_workspace ${AGENT_WORKSPACE} --launch_time ${LAUNCH_TIME}
    eval_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/howtocook-event-menu-planner/evaluation/main.py --agent_workspace ${AGENT_WORKSPACE} --groundtruth_workspace ${GROUNDTRUTH_WORKSPACE} --launch_time ${LAUNCH_TIME} --res_log_file ${RES_LOG_FILE}
    groundtruth_path: tasks/finalpool/howtocook-event-menu-planner/groundtruth_workspace
environment:
  required_services:
  - toolathlon_pg
  mcp_servers:
  - fetch
  - terminal
  - howtocook
  - excel
  - emails
  - pdf-tools
meta:
