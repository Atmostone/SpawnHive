id: sf-support-priority-review-word
suite: toolathlon-open
input:
  title: SF Support Priority Review Word
  description: |
    You are a support analytics specialist preparing a comprehensive report on ticket handling performance broken down by priority level for the support director.

    First, query the support ticket data to get statistics grouped by priority level. For each priority (High, Medium, Low), calculate the total number of tickets, the average response time in hours, and the average customer satisfaction score.

    Also look up the SLA policies to find the target response time for each priority level so you can compare actual performance against targets.

    Create a Word document called "Priority_Handling_Report.docx" in your workspace. The document should have the title "Support Ticket Priority Analysis" and include the date 2026-03-06 near the top. Then include a section for each priority level (High, Medium, Low) with the following metrics: number of tickets, average response time in hours, average customer satisfaction score, and the SLA target response time. After the per-priority sections, include an overall summary section.

    Next, create a real Excel workbook saved locally as "Priority_Metrics_Dashboard.xlsx" with a worksheet named "By Priority" that contains columns: Priority, Ticket_Count, Avg_Response_Hours, Avg_Satisfaction, SLA_Target. Include one row per priority level.

    Finally, instead of sending an email, save an email draft as a local file "Priority_Handling_Email.eml" (or .md) with From: support-analytics@company.com, To: support-director@company.com, and Subject: "Priority Handling Performance Report". The body should summarize the key findings from the analysis, including the response time performance for each priority level.

    ## Deliverables (save all of these as local files in your workspace)
    - Priority_Handling_Report.docx — Word report titled "Support Ticket Priority Analysis" with the date 2026-03-06, a section per priority level (High, Medium, Low) showing ticket count, average response time in hours, average customer satisfaction score, and SLA target response time, plus an overall summary section.
    - Priority_Metrics_Dashboard.xlsx — Excel workbook with a "By Priority" worksheet containing columns Priority, Ticket_Count, Avg_Response_Hours, Avg_Satisfaction, SLA_Target and one row per priority level.
    - Priority_Handling_Email.eml — Email draft (From: support-analytics@company.com, To: support-director@company.com, Subject: "Priority Handling Performance Report") summarizing key findings including response time performance for each priority level.
gold:
  capability_spec:
    required_tools:
    - snowflake
    - word
    - excel
    - filesystem
    match: all
  external_eval:
    preprocess_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/sf-support-priority-review-word/preprocess/main.py --agent_workspace ${AGENT_WORKSPACE} --launch_time ${LAUNCH_TIME}
    eval_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/sf-support-priority-review-word/evaluation/main.py --agent_workspace ${AGENT_WORKSPACE} --groundtruth_workspace ${GROUNDTRUTH_WORKSPACE} --launch_time ${LAUNCH_TIME} --res_log_file ${RES_LOG_FILE}
    groundtruth_path: tasks/finalpool/sf-support-priority-review-word/groundtruth_workspace
environment:
  required_services:
  - toolathlon_pg
  mcp_servers:
  - snowflake
  - word
  - excel
  - filesystem
meta:
  source: toolathlon_gym_open
  family: snowflake
  needed_mcp_servers:
  - snowflake
  - word
  - google_sheet
  - emails
  - filesystem
  removed_servers:
  - google_sheet
  - emails
  added_servers:
  - excel
  task_path: tasks/finalpool/sf-support-priority-review-word
  license: Apache-2.0
  redirect: |
    Google Sheet "Priority Metrics Dashboard" -> local Priority_Metrics_Dashboard.xlsx (excel server added).
    Email send (support-analytics@company.com -> support-director@company.com) -> local Priority_Handling_Email.eml draft.
    Dropped google_sheet and emails (output-only sinks); kept snowflake (data source), word, filesystem.
