id: wc-order-monthly-ppt-gcal
suite: toolathlon-open
input:
  title: WC Order Monthly Sales PPT and Calendar
  description: |
    The e-commerce manager wants a monthly sales performance presentation to share with stakeholders and needs a planning meeting scheduled. Analyze WooCommerce order data broken down by month to compute monthly revenue totals and order counts across all order statuses.

    Create a PowerPoint presentation called Monthly_Sales_Review.pptx with the following slides. Slide 1 should be a title slide with "Monthly Sales Performance Review" as the title. Slide 2 should be titled "Monthly Revenue Overview" and contain a table showing each month (January through December), the number of orders, and the total revenue for that month. Slide 3 should be titled "Order Volume Trends" and describe the monthly order volume patterns. Slide 4 should be titled "Key Insights" and highlight the peak revenue month, the lowest revenue month, and total annual revenue. Slide 5 should be titled "Next Steps" with planned actions for improving sales performance.

    Save a Google Calendar event as a local calendar file Monthly_Sales_Review.ics for an event called "Monthly Sales Review" on 2026-04-15 from 14:00 to 15:00 with a description noting it is a stakeholder review of monthly sales performance.

    Save the email as a local draft file Monthly_Sales_Review_Email.eml (or .md) containing From/To/Subject and body. The draft should be addressed to ecommerce_manager@store.com with subject "Monthly Sales Performance Review" and include the key revenue highlights in the email body.

    ## Deliverables (save all of these as local files in your workspace)
    - Monthly_Sales_Review.pptx — 5-slide presentation: title slide, "Monthly Revenue Overview" table (each month Jan-Dec with order count and total revenue), "Order Volume Trends" narrative, "Key Insights" (peak revenue month, lowest revenue month, total annual revenue), and "Next Steps".
    - Monthly_Sales_Review.ics — calendar event "Monthly Sales Review" on 2026-04-15 from 14:00 to 15:00 with a description noting it is a stakeholder review of monthly sales performance.
    - Monthly_Sales_Review_Email.eml — email draft (From/To/Subject/Body) to ecommerce_manager@store.com, subject "Monthly Sales Performance Review", body containing the key revenue highlights.
gold:
  capability_spec:
    required_tools:
    - woocommerce
    - pptx
    - filesystem
    match: all
  external_eval:
    preprocess_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/wc-order-monthly-ppt-gcal/preprocess/main.py --agent_workspace ${AGENT_WORKSPACE} --launch_time ${LAUNCH_TIME}
    eval_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/wc-order-monthly-ppt-gcal/evaluation/main.py --agent_workspace ${AGENT_WORKSPACE} --groundtruth_workspace ${GROUNDTRUTH_WORKSPACE} --launch_time ${LAUNCH_TIME} --res_log_file ${RES_LOG_FILE}
    groundtruth_path: tasks/finalpool/wc-order-monthly-ppt-gcal/groundtruth_workspace
environment:
  required_services:
  - toolathlon_pg
  mcp_servers:
  - woocommerce
  - pptx
  - filesystem
meta:
  source: toolathlon_gym_open
  family: woocommerce
  needed_mcp_servers:
  - woocommerce
  - pptx
  - google_calendar
  - emails
  - filesystem
  removed_servers:
  - google_calendar
  - emails
  added_servers: []
  task_path: tasks/finalpool/wc-order-monthly-ppt-gcal
  license: Apache-2.0
  redirect: |
    Google Calendar event -> local Monthly_Sales_Review.ics (written via filesystem).
    Email send -> local email draft Monthly_Sales_Review_Email.eml with From/To/Subject/Body.
    Removed google_calendar and emails (output-only sinks); kept woocommerce (data source), pptx (file producer), filesystem (text writer for .ics/.eml).
