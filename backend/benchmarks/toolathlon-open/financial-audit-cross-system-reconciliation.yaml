    eval_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/financial-audit-cross-system-reconciliation/evaluation/main.py --agent_workspace ${AGENT_WORKSPACE} --groundtruth_workspace ${GROUNDTRUTH_WORKSPACE} --launch_time ${LAUNCH_TIME} --res_log_file ${RES_LOG_FILE}
    groundtruth_path: tasks/finalpool/financial-audit-cross-system-reconciliation/groundtruth_workspace
environment:
  required_services:
  - toolathlon_pg
  mcp_servers:
  - woocommerce
  - snowflake
  - excel
  - word
  - pdf-tools
  - terminal
meta:
  source: toolathlon_gym_open
  family: financial
  needed_mcp_servers:
  - woocommerce
  - snowflake
  - excel
  - word
  - pdf-tools
  - emails
  - google_calendar
  - terminal
  removed_servers:
  - emails
  - google_calendar
  added_servers: []
  task_path: tasks/finalpool/financial-audit-cross-system-reconciliation
  license: Apache-2.0
  redirect: |
    Phase 6 email to senior finance management -> Audit_Report_Email.eml draft (dropped emails server).
    Phase 6 review-meeting calendar event -> Audit_Review_Meeting.ics file (dropped google_calendar server).
    terminal kept as the text-file writer for the .eml and .ics; excel/word/pdf-tools produce the report files.
