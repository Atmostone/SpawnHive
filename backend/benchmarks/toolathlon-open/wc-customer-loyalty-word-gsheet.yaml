id: wc-customer-loyalty-word-gsheet
suite: toolathlon-open
input:
  title: WC Customer Loyalty Word Gsheet
  description: |
    Hey, I need your help with a customer loyalty analysis for our online store. We want to segment our customers into loyalty tiers based on how much they have spent with us overall.

    First, pull all customers from our e-commerce platform who have placed at least one order. For each of those customers, get their ID, name, email, number of orders, and total amount spent.

    Then assign each customer to a tier using these rules. Gold tier is for customers who have spent $1,000 or more in total. Silver tier is for customers who have spent between $300 and $999.99. Bronze tier is for those who spent less than $300.

    Create a Word document called Customer_Loyalty.docx in the workspace. The document should start with a heading "Customer Loyalty Analysis Report" and include the report date 2026-03-06 and the total number of active customers (those with at least one order).

    Next add a "Tier Summary" section that shows for each tier (Gold, Silver, Bronze) the number of customers and their combined total spending rounded to 2 decimal places. Also include the total revenue from all active customers.

    After the summary, add three sections, one per tier: "Gold Tier Customers", "Silver Tier Customers", and "Bronze Tier Customers". Under each section, list every customer in that tier showing their name, email, number of orders, total spent rounded to 2 decimals, and average order value rounded to 2 decimals. Sort customers within each tier by total spent descending.

    Also build a local spreadsheet file titled "Customer Loyalty Dashboard" saved as Customer_Loyalty_Dashboard.xlsx, with a sheet called "Tier Data" containing columns Customer_ID, Name, Email, Orders, Total_Spent, Avg_Order_Value, and Tier. Include all active customers sorted by Total_Spent descending.

    ## Deliverables (save all of these as local files in your workspace)
    - Customer_Loyalty.docx — Word report with heading "Customer Loyalty Analysis Report", the report date 2026-03-06, the total number of active customers, a "Tier Summary" section (per-tier customer counts and combined total spending rounded to 2 decimals plus total revenue from all active customers), and three per-tier sections ("Gold Tier Customers", "Silver Tier Customers", "Bronze Tier Customers") each listing every customer's name, email, number of orders, total spent (2 decimals), and average order value (2 decimals), sorted by total spent descending.
    - Customer_Loyalty_Dashboard.xlsx — spreadsheet titled "Customer Loyalty Dashboard" with a sheet "Tier Data" containing columns Customer_ID, Name, Email, Orders, Total_Spent, Avg_Order_Value, and Tier for all active customers, sorted by Total_Spent descending.
gold:
  capability_spec:
    required_tools:
    - woocommerce
    - word
    - excel
    - filesystem
    match: all
  external_eval:
    preprocess_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/wc-customer-loyalty-word-gsheet/preprocess/main.py --agent_workspace ${AGENT_WORKSPACE} --launch_time ${LAUNCH_TIME}
    eval_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/wc-customer-loyalty-word-gsheet/evaluation/main.py --agent_workspace ${AGENT_WORKSPACE} --groundtruth_workspace ${GROUNDTRUTH_WORKSPACE} --launch_time ${LAUNCH_TIME} --res_log_file ${RES_LOG_FILE}
    groundtruth_path: tasks/finalpool/wc-customer-loyalty-word-gsheet/groundtruth_workspace
environment:
  required_services:
  - toolathlon_pg
  mcp_servers:
  - woocommerce
  - word
  - excel
  - filesystem
meta:
  source: toolathlon_gym_open
  family: woocommerce
  needed_mcp_servers:
  - woocommerce
  - word
  - google_sheet
  - filesystem
  removed_servers:
  - google_sheet
  added_servers:
  - excel
  task_path: tasks/finalpool/wc-customer-loyalty-word-gsheet
  license: Apache-2.0
  redirect: |
    The "Customer Loyalty Dashboard" Google Sheet (output sink) was redirected to a local
    Customer_Loyalty_Dashboard.xlsx produced via the "excel" server; google_sheet was dropped
    and excel added. The Word report (Customer_Loyalty.docx) was already a local file and is unchanged.
