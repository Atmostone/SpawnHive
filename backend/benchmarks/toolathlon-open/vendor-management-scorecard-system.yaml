id: vendor-management-scorecard-system
suite: toolathlon-open
input:
  title: Vendor Management Scorecard System
  description: |
    Your organization must implement a comprehensive vendor performance management system to evaluate supplier effectiveness and optimize vendor relationships. The first phase involves collecting comprehensive vendor performance metrics across multiple dimensions. Gather delivery performance data showing on-time delivery rates, lead time consistency, and shipment accuracy for each vendor. Extract quality metrics including defect rates, return rates, and customer complaint frequency. Compile financial data including pricing competitiveness, invoice accuracy, and payment term compliance. Document service quality indicators such as responsiveness, technical support availability, and problem resolution speed.

    In the second phase, you will analyze and organize vendor performance data into standardized measurement categories. Calculate key performance indicators for each vendor covering delivery, quality, cost, and service dimensions. Organize metrics by vendor and time period to identify trends. Assess data quality and identify any gaps in performance information. Benchmark vendor performance against industry standards and internal targets.

    The third phase requires developing and calculating balanced vendor scorecards using weighted criteria. Design scorecard frameworks balancing multiple vendor dimensions with weights reflecting organizational priorities. Calculate composite scores for each vendor integrating all performance metrics. Rank vendors across different performance dimensions to identify strengths and weaknesses. Create vendor tiering systems classifying vendors as strategic partners, preferred suppliers, acceptable vendors, or performance concerns.

    In the fourth phase, you will perform detailed analysis of vendor performance trends and variability. Analyze whether vendor performance is improving or declining over time. Identify vendors with consistent excellence versus inconsistent performers. Assess correlation between vendor characteristics such as size or geography and performance levels. Document specific performance issues for underperforming vendors with supporting evidence.

    The fifth phase involves developing strategic recommendations for vendor management. Identify vendors recommended for increased business based on superior performance. Flag vendors requiring performance improvement plans with specific metrics and timelines. Develop negotiation strategies for vendor relationship changes considering contract renewal timelines and market alternatives. Create vendor development programs for important vendors with improvement potential.

    The sixth phase requires communicating vendor performance findings to procurement and business leadership. Prepare detailed vendor scorecard reports with performance rankings and trend analyses, and save them as a local Word document. Create spreadsheet systems for ongoing vendor performance tracking and monitoring, and save them as a local .xlsx workbook. Save the communications to underperforming vendors with performance feedback and improvement expectations as local email draft files (one .eml or .md file per vendor) containing From/To/Subject and the message body. Save the schedule of vendor review meetings (to discuss performance, provide feedback, and establish improvement plans or renegotiate terms) as a local .ics calendar file.

    ## Deliverables (save all of these as local files in your workspace)
    - Vendor_Scorecard_Report.docx — Word document covering phases one through five: collected delivery performance (on-time delivery rates, lead time consistency, shipment accuracy), quality metrics (defect rates, return rates, customer complaint frequency), financial data (pricing competitiveness, invoice accuracy, payment term compliance), and service quality indicators (responsiveness, technical support availability, problem resolution speed); the standardized KPIs per vendor across delivery, quality, cost, and service organized by vendor and time period with trends, data-quality/gap assessment, and benchmarking against industry standards and internal targets; the weighted scorecard framework, composite scores, dimension rankings, and vendor tiering (strategic partners, preferred suppliers, acceptable vendors, performance concerns); the trend and variability analysis (improving vs. declining, consistent excellence vs. inconsistent performers, correlations with vendor size/geography, documented issues for underperformers with evidence); and the strategic recommendations (vendors for increased business, vendors needing improvement plans with metrics/timelines, negotiation strategies tied to contract renewal timelines and market alternatives, and vendor development programs).
    - Vendor_Performance_Tracking.xlsx — spreadsheet system for ongoing vendor performance tracking and monitoring (per-vendor KPIs by dimension and time period, weighted composite scores, rankings, and tier classifications).
    - Vendor_Feedback_Emails/ — one email draft file per underperforming vendor (.eml or .md), each containing From/To/Subject and a body with that vendor's performance feedback, specific metrics, and improvement expectations.
    - Vendor_Review_Meetings.ics — calendar file scheduling the vendor review meetings to discuss performance, provide feedback, and establish improvement plans or renegotiate terms.
gold:
  capability_spec:
    required_tools:
    - snowflake
    - excel
    - word
    - terminal
    - filesystem
    match: all
  external_eval:
    preprocess_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/vendor-management-scorecard-system/preprocess/main.py --agent_workspace ${AGENT_WORKSPACE} --launch_time ${LAUNCH_TIME}
    eval_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/vendor-management-scorecard-system/evaluation/main.py --agent_workspace ${AGENT_WORKSPACE} --groundtruth_workspace ${GROUNDTRUTH_WORKSPACE} --launch_time ${LAUNCH_TIME} --res_log_file ${RES_LOG_FILE}
    groundtruth_path: tasks/finalpool/vendor-management-scorecard-system/groundtruth_workspace
environment:
  required_services:
  - toolathlon_pg
  mcp_servers:
  - snowflake
  - excel
  - word
  - terminal
  - filesystem
meta:
  source: toolathlon_gym_open
  family: vendor
  needed_mcp_servers:
  - snowflake
  - excel
  - word
  - google_sheet
  - emails
  - google_calendar
  - terminal
  - filesystem
  removed_servers:
  - google_sheet
  - emails
  - google_calendar
  added_servers: []
  task_path: tasks/finalpool/vendor-management-scorecard-system
  license: Apache-2.0
  redirect: |
    Phase 6 sinks were redirected to local files. Scorecard reports -> Vendor_Scorecard_Report.docx via word. Spreadsheet tracking systems (server google_sheet) -> Vendor_Performance_Tracking.xlsx via the excel server (already present). Vendor feedback communications (server emails) -> per-vendor .eml/.md draft files under Vendor_Feedback_Emails/. Vendor review meeting scheduling (server google_calendar) -> Vendor_Review_Meetings.ics written via the terminal/filesystem servers. snowflake is the read-only data source and is kept.
