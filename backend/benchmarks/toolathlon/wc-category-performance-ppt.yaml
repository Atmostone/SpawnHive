id: wc-category-performance-ppt
suite: toolathlon
input:
  title: WC Category Performance Ppt
  description: |
    I need to prepare a category performance review presentation for our e-commerce store. Please pull product data from the online store and analyze performance by product category. For each category, calculate the number of products, the average price, the total units sold across all products in that category, and the average customer rating.

    Create an Excel workbook called Category_Data.xlsx in the workspace with a sheet named "Category Performance" containing columns for Category, Product_Count, Avg_Price, Total_Units_Sold, and Avg_Rating. Sort the rows alphabetically by category name.

    Then create a PowerPoint presentation called Category_Review.pptx in the workspace. The first slide should be a title slide with the title "Product Category Performance Review". After that, create one slide for each product category showing the category name as the slide title and the key metrics (number of products, average price, total units sold, and average rating) in the slide content. Finally, add a summary slide at the end titled "Overall Summary" that highlights the category with the most products, the category with the highest average rating, and the category with the most total units sold.
gold:
  capability_spec:
    required_tools:
    - woocommerce
    - pptx
    - excel
    - filesystem
    match: all
  external_eval:
    preprocess_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/wc-category-performance-ppt/preprocess/main.py --agent_workspace ${AGENT_WORKSPACE} --launch_time ${LAUNCH_TIME}
    eval_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/wc-category-performance-ppt/evaluation/main.py --agent_workspace ${AGENT_WORKSPACE} --groundtruth_workspace ${GROUNDTRUTH_WORKSPACE} --launch_time ${LAUNCH_TIME} --res_log_file ${RES_LOG_FILE}
    groundtruth_path: tasks/finalpool/wc-category-performance-ppt/groundtruth_workspace
environment:
  required_services:
  - toolathlon_pg
  mcp_servers:
  - woocommerce
  - pptx
  - excel
  - filesystem
meta:
  source: toolathlon_gym
  family: woocommerce
  needed_mcp_servers:
  - woocommerce
  - pptx
  - excel
  - filesystem
  task_path: tasks/finalpool/wc-category-performance-ppt
  license: Apache-2.0
