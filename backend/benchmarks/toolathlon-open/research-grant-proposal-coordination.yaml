id: research-grant-proposal-coordination
suite: toolathlon-open
input:
  title: Research Grant Proposal Coordination
  description: |
    Your research institution is preparing a competitive grant proposal that requires coordinating contributions from multiple research teams. The first phase involves collecting detailed information from all participating researchers using an online research database. Identify key publications from each researcher, compile their academic credentials, and extract their research focus areas and expertise domains.

    In the second phase, you will gather CVs and publication lists from researcher email submissions. Consolidate all materials into a structured format, noting the most significant contributions from each team member. Create a comprehensive researcher database that includes contact information, current projects, available time commitments, and research interests aligned with the grant objectives.

    The third phase requires organizing the proposal structure. Create sections for the project overview, research methodology, team composition, timeline, and budget justification. Establish a collaborative workspace where all team members can contribute their sections and provide feedback on other sections. Document all major milestones and decision points for the proposal development. Save this proposal structure and collaboration plan as a local Word document Proposal_Structure.docx (sections, contribution/feedback workflow, milestones, and decision points).

    In the fourth phase, create the main proposal document by synthesizing all team contributions into a cohesive narrative. The document should clearly articulate the research questions, explain the proposed methodology, demonstrate the team's qualifications, and justify the requested budget. Ensure the writing is clear, compelling, and directly aligned with the funding agency's priorities and evaluation criteria. Save this as a local Word document Grant_Proposal.docx.

    The fifth phase involves verifying compliance with all funder requirements. Review the proposal against the detailed requirements checklist provided by the funding agency, including page limits, formatting specifications, citation styles, and submission formats. Conduct a thorough quality review and make necessary revisions. The sixth phase requires scheduling coordination meetings with all team members to review final drafts. Instead of sending live calendar invitations, save the coordination meetings as a local calendar file Coordination_Meetings.ics (one VEVENT per meeting, with title, attendees, date/time, and submission deadlines). Establish submission deadlines and prepare all supporting documents. Finally, compile the complete submission package including the main proposal, supporting documents, budgets, and compliance verification checklist.

    ## Deliverables (save all of these as local files in your workspace)
    - Researcher_Database.docx — consolidated researcher database: key publications, academic credentials, research focus/expertise, contact info, current projects, available time commitments, and grant-aligned research interests for each team member
    - Proposal_Structure.docx — proposal section breakdown (project overview, research methodology, team composition, timeline, budget justification), the collaboration/contribution/feedback workflow, and documented milestones and decision points
    - Grant_Proposal.docx — the main proposal document synthesizing all contributions: research questions, proposed methodology, team qualifications, and budget justification, aligned with the funder's priorities and evaluation criteria
    - Compliance_Checklist.docx — compliance verification against funder requirements (page limits, formatting specs, citation styles, submission formats) plus quality-review notes and revisions made
    - Coordination_Meetings.ics — calendar file with one VEVENT per coordination meeting (title, attendees, date/time) and the submission deadlines
