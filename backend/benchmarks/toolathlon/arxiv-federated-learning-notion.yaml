id: arxiv-federated-learning-notion
suite: toolathlon
input:
  title: Arxiv Federated Learning Notion
  description: |
    I am organizing my research on federated learning and need to set up a knowledge base. Please search for papers about federated learning from the arxiv database and organize them in two ways.

    First, create a Notion page titled "Federated Learning Research Hub". Inside this page, create a child database called "Paper Index" that contains an entry for each federated learning paper. Each entry should include the paper title, authors, and a short summary.

    Second, create an Excel file called "Federated_Learning_Papers.xlsx" in my workspace. It should have two sheets. The first sheet "Paper Details" should have columns Paper_ID, Title, Authors, Year, and Abstract_Length (the character count of the abstract). The second sheet "Summary" should have columns Metric and Value, listing Total_Papers (the number of papers found), Avg_Abstract_Length (the average character count of all abstracts rounded to the nearest integer), Earliest_Year, and Latest_Year.

    I expect there to be around 6 federated learning papers in the database. Please include all papers that are related to federated learning, including foundational papers about federated approaches and surveys of the field.
gold:
  capability_spec:
    required_tools:
    - arxiv_local
    - notion
    - excel
    - filesystem
    match: all
  external_eval:
    preprocess_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/arxiv-federated-learning-notion/preprocess/main.py --agent_workspace ${AGENT_WORKSPACE} --launch_time ${LAUNCH_TIME}
    eval_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/arxiv-federated-learning-notion/evaluation/main.py --agent_workspace ${AGENT_WORKSPACE} --groundtruth_workspace ${GROUNDTRUTH_WORKSPACE} --launch_time ${LAUNCH_TIME} --res_log_file ${RES_LOG_FILE}
    groundtruth_path: tasks/finalpool/arxiv-federated-learning-notion/groundtruth_workspace
environment:
  required_services:
  - toolathlon_pg
  mcp_servers:
  - arxiv_local
  - notion
  - excel
  - filesystem
meta:
  source: toolathlon_gym
  family: arxiv
  needed_mcp_servers:
  - arxiv_local
  - notion
  - excel
  - filesystem
  task_path: tasks/finalpool/arxiv-federated-learning-notion
  license: Apache-2.0
