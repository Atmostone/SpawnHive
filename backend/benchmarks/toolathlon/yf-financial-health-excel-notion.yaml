id: yf-financial-health-excel-notion
suite: toolathlon
input:
  title: YF Financial Health Excel Notion
  description: |
    You are a financial analyst conducting a financial health assessment of tracked companies. Your workspace contains no pre-existing files for this task.

    Connect to the Yahoo Finance data source and retrieve the financial statement data for the available tracked stocks. You need income statement data (total revenue, net income) and balance sheet data (total assets, total liabilities, stockholders equity) for each company from the most recent annual period.

    Create an Excel file called Financial_Health_Report.xlsx in your workspace with two sheets. The first sheet should be called "Income Statement" with columns: Symbol, Total_Revenue, Net_Income, Profit_Margin_Pct (which is Net_Income divided by Total_Revenue times 100, rounded to 1 decimal place). Include rows for each of the five stocks: AMZN, GOOGL, JNJ, JPM, and XOM. Sort the rows alphabetically by Symbol.

    The second sheet should be called "Balance Sheet" with columns: Symbol, Total_Assets, Total_Liabilities, Equity. Populate it with the corresponding balance sheet data for the same five stocks, sorted alphabetically by Symbol.

    Create a Notion page titled "Financial Health Dashboard" that summarizes the key findings from your analysis. The page should mention which companies have the highest revenue, best profit margins, and strongest balance sheets based on the data you retrieved.

    Send an email to finance_team@company.com with subject "Financial Health Report" summarizing the findings and mentioning the Excel file and Notion page you created.

    When you are done, call claim_done.
gold:
  capability_spec:
    required_tools:
    - yahoo-finance
    - excel
    - notion
    - emails
    - filesystem
    match: all
  external_eval:
    preprocess_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/yf-financial-health-excel-notion/preprocess/main.py --agent_workspace ${AGENT_WORKSPACE} --launch_time ${LAUNCH_TIME}
    eval_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/yf-financial-health-excel-notion/evaluation/main.py --agent_workspace ${AGENT_WORKSPACE} --groundtruth_workspace ${GROUNDTRUTH_WORKSPACE} --launch_time ${LAUNCH_TIME} --res_log_file ${RES_LOG_FILE}
    groundtruth_path: tasks/finalpool/yf-financial-health-excel-notion/groundtruth_workspace
environment:
  required_services:
  - toolathlon_pg
  mcp_servers:
  - yahoo-finance
  - excel
  - notion
  - emails
  - filesystem
meta:
  source: toolathlon_gym
  family: yahoo-finance
  needed_mcp_servers:
  - yahoo-finance
  - excel
  - notion
  - emails
  - filesystem
  task_path: tasks/finalpool/yf-financial-health-excel-notion
