id: yf-financial-metrics-notion-email
suite: toolathlon
input:
  title: YF Financial Metrics Notion Email
  description: |
    I need a financial health assessment for three companies in our investment portfolio to support our quarterly review.

    Please get the most recent annual income statement and balance sheet data for Alphabet, Amazon, and Johnson and Johnson from our financial data system. Create an Excel file called Financial_Health_Report.xlsx with two sheets. The first sheet called Key Metrics should show for each company the columns Symbol, Total_Revenue in billions rounded to 2 decimal places, Net_Income in billions rounded to 2 decimal places, Total_Assets in billions rounded to 2 decimal places, and Profit_Margin_Pct which is Net Income divided by Total Revenue times 100 rounded to 2 decimal places. Sort the rows by Total_Revenue descending. The second sheet called Summary should have two columns Metric and Value with rows for Highest_Revenue_Company showing the company name with the largest revenue, Most_Profitable_Company showing the company with the highest profit margin, and Avg_Profit_Margin showing the average profit margin across the three companies rounded to 2 decimal places.

    Then create a Notion page titled Investment Portfolio Financial Analysis 2026 with a summary of the key findings from the financial data, including which company leads in revenue, which is most profitable, and overall observations about the portfolio health.

    Create a Word document called Financial_Analysis_Report.docx with a heading Financial Health Report Q1 2026 and analysis paragraphs covering each company's revenue, profitability, and asset base.

    Send an email to portfolio.manager@investment.com with the subject Q1 2026 Financial Health Assessment. The email body should contain the key metrics for each company and highlight which company is the strongest performer.
gold:
  capability_spec:
    required_tools:
    - yahoo-finance
    - excel
    - notion
    - word
    - emails
    match: all
  external_eval:
    preprocess_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/yf-financial-metrics-notion-email/preprocess/main.py --agent_workspace ${AGENT_WORKSPACE} --launch_time ${LAUNCH_TIME}
    eval_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/yf-financial-metrics-notion-email/evaluation/main.py --agent_workspace ${AGENT_WORKSPACE} --groundtruth_workspace ${GROUNDTRUTH_WORKSPACE} --launch_time ${LAUNCH_TIME} --res_log_file ${RES_LOG_FILE}
    groundtruth_path: tasks/finalpool/yf-financial-metrics-notion-email/groundtruth_workspace
environment:
  required_services:
  - toolathlon_pg
  mcp_servers:
  - yahoo-finance
  - excel
  - notion
  - word
  - emails
meta:
  source: toolathlon_gym
  family: yahoo-finance
  needed_mcp_servers:
  - yahoo-finance
  - excel
  - notion
  - word
  - emails
  task_path: tasks/finalpool/yf-financial-metrics-notion-email
