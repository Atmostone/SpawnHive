meta:
  source: toolathlon_gym_open
  family: snowflake
  needed_mcp_servers:
  - snowflake
  - pptx
  - google_calendar
  - emails
  - filesystem
  removed_servers:
  - google_calendar
  - emails
  added_servers: []
  task_path: tasks/finalpool/sf-sales-regional-analysis-ppt-gcal-email
  license: Apache-2.0
  redirect: |
    Google Calendar event "Regional Sales Review Meeting" -> local Regional_Sales_Review_Meeting.ics (written via filesystem), 14 days from today, one hour, UTC.
    Email send (reporting@ -> sales-leadership@, subject "Regional Sales Performance Review") -> local Regional_Sales_Review_Email.eml draft (written via filesystem).
    Dropped google_calendar and emails (output-only sinks); kept snowflake (input data warehouse), pptx (presentation producer), filesystem (reads Sales_Target_2024.pdf and writes .ics/.eml).
