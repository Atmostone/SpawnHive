id: fetch-arxiv-survey-word-notion-email
suite: toolathlon
input:
  title: Fetch Arxiv Survey Word Notion Email
  description: |
    I need help with a arxiv survey analysis. There is external benchmark data available that I need you to fetch the data from http://localhost:30325/api/data.json and extract the relevant metrics.

    Then search for relevant academic papers on the topic.

    Use the terminal to create and run a Python script called arxiv_survey_processor.py in the workspace that reads the collected data from JSON files you create, performs the analysis, and outputs arxiv_survey_results.json.

    Create an Excel file called Survey_Report.xlsx with three sheets. The first sheet Data_Analysis should contain the main comparison data with relevant columns. The second sheet Metrics should summarize key metrics. The third sheet Recommendations should list actionable items.

    The Data_Analysis sheet should include columns for the primary dimension (such as department, product, region, or topic), our internal metric values, the external benchmark values, and the gap or difference between them. Sort the data alphabetically by the primary dimension. The Metrics sheet should have two columns Metric and Value summarizing total counts, averages, and key statistics. The Recommendations sheet should list priority actions based on the gap analysis. Also create a Word document called Survey_Analysis.docx with an executive summary, key findings, and recommendations sections. Send an email to team-lead@company.com with subject "Analysis Report Complete" summarizing the key findings. Create a Notion page titled "Arxiv Survey Dashboard" with a summary of the analysis.
gold:
  capability_spec:
    required_tools:
    - fetch
    - terminal
    - arxiv_local
    - scholarly
    - word
    - notion
    - emails
    match: all
  external_eval:
    preprocess_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/fetch-arxiv-survey-word-notion-email/preprocess/main.py --agent_workspace ${AGENT_WORKSPACE} --launch_time ${LAUNCH_TIME}
    eval_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/fetch-arxiv-survey-word-notion-email/evaluation/main.py --agent_workspace ${AGENT_WORKSPACE} --groundtruth_workspace ${GROUNDTRUTH_WORKSPACE} --launch_time ${LAUNCH_TIME} --res_log_file ${RES_LOG_FILE}
    groundtruth_path: tasks/finalpool/fetch-arxiv-survey-word-notion-email/groundtruth_workspace
environment:
  required_services:
  - toolathlon_pg
  mcp_servers:
  - fetch
  - terminal
  - arxiv_local
  - scholarly
  - word
  - notion
  - emails
meta:
  source: toolathlon_gym
  family: fetch
  needed_mcp_servers:
  - fetch
  - terminal
  - arxiv_local
  - scholarly
  - word
  - notion
  - emails
  task_path: tasks/finalpool/fetch-arxiv-survey-word-notion-email
  license: Apache-2.0
