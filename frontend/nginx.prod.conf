# Production TLS edge for SpawnHive (SPA-78). Baked into the frontend `prod` image.
# Serves the built SPA and reverse-proxies /api + /ws to the api container on the
# same origin (the SPA calls a relative /api and derives wss:// from the page origin),
# terminates HTTPS, and answers the ACME http-01 challenge on :80.
# Proxy tuning mirrors nginx/nginx.conf (WS upgrade, 50m bodies, long timeouts).

worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;   # correct Content-Type for JS/CSS assets
    default_type  application/octet-stream;
    sendfile on;

    gzip on;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # docker-internal DNS resolver — lets the variable upstreams below re-resolve `api`.
    resolver 127.0.0.11 valid=10s ipv6=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # --- HTTP :80 — ACME challenge + redirect everything else to HTTPS ---
    server {
        listen 80;
        listen [::]:80;
        server_name spawnhive.cloud;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- HTTPS :443 — SPA + /api + /ws ---
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name spawnhive.cloud;

        ssl_certificate     /etc/letsencrypt/live/spawnhive.cloud/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/spawnhive.cloud/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        # Big bodies for document uploads.
        client_max_body_size 50m;

        # WebSocket endpoints (live agent logs, events, chat). Long timeouts for
        # streaming; Upgrade/Connection headers for the ws handshake.
        location /ws/ {
            set $ws_upstream "api:8000";
            proxy_pass http://$ws_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;

            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        # REST API. 300s covers synchronous LLM-bound endpoints (several sequential
        # model calls); very long jobs use the async batch path instead.
        location /api/ {
            set $rest_upstream "api:8000";
            proxy_pass http://$rest_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_read_timeout  300s;
            proxy_send_timeout  300s;
        }

        # SPA static assets + history fallback (react-router deep links like
        # /experiments/:id must return index.html on a hard refresh).
        location / {
            root /usr/share/nginx/html;
            try_files $uri /index.html;
        }
    }
}
