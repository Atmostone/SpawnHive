id: fetch-arxiv-conference-schedule-gcal-notion
suite: toolathlon
input:
  title: Fetch Arxiv Conference Schedule Gcal Notion
  description: |
    I manage a research lab and we need to prepare for the upcoming AI Methods Conference happening March 24-26, 2026. The conference schedule is available as a JSON API at http://localhost:30207/api/schedule.json and it contains the full program with session topics, paper presentation times, room assignments, and speaker names.

    Please start by fetching the conference schedule from that API endpoint. The schedule contains multiple sessions across three days, each with several paper presentations.

    After reviewing the schedule, search our research paper archives for papers related to the conference topics. Look specifically for papers about transformer architectures, attention mechanisms, and neural network optimization since those are the main conference themes. Also search the academic literature database for related scholarly publications on these topics.

    Based on what you find, create a database in the knowledge base called "Conference Reading List" with the following properties: Title (title type), Authors (rich_text), Source (select with options "ArXiv" or "Scholar"), Conference_Session (rich_text indicating which conference session the paper relates to), Relevance_Score (number from 1 to 5 where 5 is most relevant), and Read_By_Date (date). Add at least 6 entries to this database combining papers found from both the archives and scholarly sources. Assign relevance scores based on how closely each paper matches the conference session topics. Set the Read_By_Date to March 20, 2026 for high-relevance papers (score 4-5) and March 23, 2026 for lower-relevance ones.

    Finally, create reading group sessions in the calendar. Schedule three sessions: one on March 18, 2026 from 14:00 to 15:30 titled "Reading Group: Transformer Architectures", one on March 19, 2026 from 14:00 to 15:30 titled "Reading Group: Attention Mechanisms", and one on March 20, 2026 from 14:00 to 15:30 titled "Reading Group: Neural Optimization". In each session description, list the paper titles from the reading list that are relevant to that session topic.
gold:
  capability_spec:
    required_tools:
    - fetch
    - arxiv_local
    - scholarly
    - notion
    - google_calendar
    - pdf-tools
    - terminal
    match: all
  external_eval:
    preprocess_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/fetch-arxiv-conference-schedule-gcal-notion/preprocess/main.py --agent_workspace ${AGENT_WORKSPACE} --launch_time ${LAUNCH_TIME}
    eval_command: python ${TOOLATHLON_GYM_PATH}/tasks/finalpool/fetch-arxiv-conference-schedule-gcal-notion/evaluation/main.py --agent_workspace ${AGENT_WORKSPACE} --groundtruth_workspace ${GROUNDTRUTH_WORKSPACE} --launch_time ${LAUNCH_TIME} --res_log_file ${RES_LOG_FILE}
    groundtruth_path: tasks/finalpool/fetch-arxiv-conference-schedule-gcal-notion/groundtruth_workspace
environment:
  required_services:
  - toolathlon_pg
  mcp_servers:
  - fetch
  - arxiv_local
  - scholarly
  - notion
  - google_calendar
  - pdf-tools
  - terminal
meta:
  source: toolathlon_gym
  family: fetch
  needed_mcp_servers:
  - fetch
  - arxiv_local
  - scholarly
  - notion
  - google_calendar
  - pdf-tools
