[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = [
    "backend/alembic/versions/",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = [
    "E501",   # line length handled by formatter / not enforced strictly
    "B008",   # FastAPI Depends() pattern uses function call defaults
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"
